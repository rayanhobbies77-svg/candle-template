<!DOCTYPE html>
<html>
<head>
  <title>GlowNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #f5f5f7;
      transition: 0.3s;
    }

    .dark {
      background: #000;
      color: white;
    }

    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: rgba(255,255,255,0.8);
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 1s ease;
    }

    .hero h1 {
      font-size: 50px;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .image-section {
      height: 400px;
      background-size: cover;
      background-position: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 20px;
      transition: 0.3s;
    }

    .dark .product {
      background: #1c1c1e;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    #cart {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.9);
      padding: 10px;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>

<body>

<header>
  <b>GlowNest</b>
  <button onclick="toggleDark()">🌙</button>
</header>

<div class="hero">
  <h1>GlowNest Candles</h1>
  <p>Luxury. Calm. Aesthetic.</p>
</div>

<div class="image-section" style="background-image:url('https://images.unsplash.com/photo-1603006905003-be475563bc59');"></div>

<section>
  <h2>Our Collection</h2>

  <div class="products">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1602526216430-7f5caa7b9c88">
      <h3>Lavender Calm</h3>
      <p>£6</p>
      <button onclick="addToCart('Lavender',6)">Add</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
      <h3>Vanilla Glow</h3>
      <p>£5</p>
      <button onclick="addToCart('Vanilla',5)">Add</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1612197528163-9d6c1b3f8fbb">
      <h3>Chocolate Warmth</h3>
      <p>£7</p>
      <button onclick="addToCart('Chocolate',7)">Add</button>
    </div>

  </div>
</section>

<div class="image-section" style="background-image:url('https://images.unsplash.com/photo-1612197528163-9d6c1b3f8fbb');"></div>

<section>
  <h2>Why GlowNest?</h2>
  <p>Designed to relax your mind and upgrade your space.</p>
</section>

<!-- CART -->
<div id="cart">
  🛒 £<span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item => total += item.price);
document.getElementById("total").innerText = total;

function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  localStorage.setItem("orders", JSON.stringify(cart));

  // STRIPE LINK (replace later)
  window.open("https://buy.stripe.com/test");

  cart = [];
  total = 0;
  localStorage.removeItem("cart");
  document.getElementById("total").innerText = 0;
}

function toggleDark() {
  document.body.classList.toggle("dark");

  const db = firebase.firestore(db.collection("orders").add({
  user: user.email,
  items: cart,
  total: total,
  date: new Date()
}););
  
}
</script>

</body>
</html>
