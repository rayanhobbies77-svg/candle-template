<!DOCTYPE html>
<html>
<head>
  <title>GlowNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #f5f5f7;
      color: #111;
      transition: 0.3s;
    }

    .dark {
      background: #000;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      animation: fadeIn 1s ease;
    }

    .hero h1 {
      font-size: 40px;
      margin: 0;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 25px;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
      animation: fadeUp 0.8s ease;
    }

    .dark .product {
      background: #1c1c1e;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .dark button {
      background: white;
      color: black;
    }

    #cart {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 10px;
    }

    .dark #cart {
      background: rgba(0,0,0,0.9);
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    @keyframes fadeUp {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <b>GlowNest</b>
  <button onclick="toggleDark()">🌙</button>
</header>

<div class="hero">
  <h1>Luxury Candles</h1>
  <p>Designed for calm living</p>
</div>

<div class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1602526216430-7f5caa7b9c88">
    <h3>Lavender Calm</h3>
    <p>£6</p>
    <button onclick="addToCart('Lavender',6)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
    <h3>Vanilla Glow</h3>
    <p>£5</p>
    <button onclick="addToCart('Vanilla',5)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1612197528163-9d6c1b3f8fbb">
    <h3>Chocolate Warmth</h3>
    <p>£7</p>
    <button onclick="addToCart('Chocolate',7)">Add</button>
  </div>

</div>

<div id="cart">
  🛒 £<span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item => total += item.price);
document.getElementById("total").innerText = total;

function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  localStorage.setItem("orders", JSON.stringify(cart));
  alert("Order saved! (Demo payment)");

  // STRIPE PLACEHOLDER
  window.open("https://buy.stripe.com/test");

  cart = [];
  total = 0;
  localStorage.removeItem("cart");
  document.getElementById("total").innerText = 0;
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
