
<!DOCTYPE html>
<html>
<head>
  <title>GlowNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #f5f5f7;
      transition: 0.3s;
    }

    .dark {
      background: #111;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: white;
      position: sticky;
      top: 0;
    }

    .dark header {
      background: #1c1c1e;
    }

    .title {
      font-weight: bold;
      font-size: 20px;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 32px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .dark .product {
      background: #1c1c1e;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 15px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .dark button {
      background: white;
      color: black;
    }

    #cart {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      padding: 10px;
    }

    .dark #cart {
      background: #1c1c1e;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 90%;
    }

    #login {
      text-align: center;
      padding: 30px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="username" placeholder="Enter name">
  <button onclick="login()">Enter</button>
</div>

<div id="main" style="display:none;">

<header>
  <div class="title">GlowNest</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
  </div>
</header>

<div class="hero">
  <h1>Luxury Candles</h1>
  <p>Clean. Calm. Glow.</p>
</div>

<div class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
    <h3>Vanilla</h3>
    <p>£5</p>
    <button onclick="addToCart('Vanilla',5)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1602526216430-7f5caa7b9c88">
    <h3>Lavender</h3>
    <p>£6</p>
    <button onclick="addToCart('Lavender',6)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1612197528163-9d6c1b3f8fbb">
    <h3>Chocolate</h3>
    <p>£7</p>
    <button onclick="addToCart('Chocolate',7)">Add</button>
  </div>

</div>

<!-- UPLOAD IMAGE -->
<div style="text-align:center; padding:20px;">
  <h3>Upload Your Own Product Image</h3>
  <input type="file" onchange="uploadImage(event)">
  <img id="preview" style="width:150px; display:block; margin:auto;">
</div>

<!-- CART -->
<div id="cart">
  🛒 Total: £<span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

</div>

<script>
let cart = [];
let total = 0;

function login() {
  let user = document.getElementById("username").value;
  if (!user) return alert("Enter name");

  localStorage.setItem("user", user);
  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
}

function addToCart(name, price) {
  cart.push({name, price});
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  alert("Order placed for £" + total);
  cart = [];
  total = 0;
  document.getElementById("total").innerText = 0;
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

function uploadImage(event) {
  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("preview").src = reader.result;
  }
  reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
