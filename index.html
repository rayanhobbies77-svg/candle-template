<!DOCTYPE html>
<html>
<head>
  <title>GlowNest Candles</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      transition: 0.3s;
    }

    header {
      background: #232f3e;
      color: white;
      padding: 15px;
      font-size: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dark {
      background: #121212;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
      justify-content: center;
    }

    .product {
      background: white;
      width: 220px;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .dark .product {
      background: #1e1e1e;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      border: none;
      background: #ff9900;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #cart {
      position: fixed;
      right: 0;
      top: 60px;
      width: 250px;
      background: white;
      padding: 10px;
      height: 100%;
      overflow-y: auto;
    }

    .dark #cart {
      background: #1e1e1e;
    }

    input {
      width: 90%;
      margin: 5px;
      padding: 8px;
    }
  </style>
</head>

<body>

<header>
  🕯️ GlowNest
  <div>
    <button onclick="toggleDark()">🌙</button>
  </div>
</header>

<div class="container">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
    <h3>Vanilla</h3>
    <p>£5</p>
    <button onclick="addToCart('Vanilla',5)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1602526216430-7f5caa7b9c88">
    <h3>Lavender</h3>
    <p>£6</p>
    <button onclick="addToCart('Lavender',6)">Add</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1612197528163-9d6c1b3f8fbb">
    <h3>Chocolate</h3>
    <p>£7</p>
    <button onclick="addToCart('Chocolate',7)">Add</button>
  </div>

</div>

<!-- CART -->
<div id="cart">
  <h3>🛒 Cart</h3>
  <ul id="cartList"></ul>
  <p>Total: £<span id="total">0</span></p>

  <h4>Checkout</h4>
  <input id="name" placeholder="Name">
  <input id="address" placeholder="Address">

  <button onclick="checkout()">Pay (Demo)</button>

  <h4>Orders</h4>
  <ul id="orders"></ul>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;

  let li = document.createElement("li");
  li.innerText = name + " £" + price;
  document.getElementById("cartList").appendChild(li);

  document.getElementById("total").innerText = total;
}

function checkout() {
  let name = document.getElementById("name").value;

  if (!name || cart.length === 0) {
    alert("Fill info or add items!");
    return;
  }

  let order = name + " ordered £" + total;

  let li = document.createElement("li");
  li.innerText = order;
  document.getElementById("orders").appendChild(li);

  alert("✅ Payment successful (demo)");

  cart = [];
  total = 0;
  document.getElementById("cartList").innerHTML = "";
  document.getElementById("total").innerText = "0";
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
