<!DOCTYPE html>
<html>
<head>
  <title>GlowNest Candles</title>
  <style>
    body {
      font-family: Arial;
      background: #fff5e6;
      text-align: center;
      margin: 0;
    }
    header {
      background: #ffb366;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .product {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
    #checkout {
      display: none;
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
    }
  </style>
</head>

<body>

<header>🕯️ GlowNest Candles</header>

<!-- PRODUCTS -->
<div class="product">
  <h3>Vanilla Candle</h3>
  <p>£10</p>
  <button onclick="buy('Vanilla Candle')">Buy</button>
</div>

<div class="product">
  <h3>Lavender Candle</h3>
  <p>£15</p>
  <button onclick="buy('Lavender Candle')">Buy</button>
</div>

<div class="product">
  <h3>Honey Candle</h3>
  <p>£20</p>
  <button onclick="buy('Chocolate Candle')">Buy</button>
</div>

<!-- CHECKOUT -->
<div id="checkout">
  <h2>Checkout</h2>
  <p id="productName"></p>

  <input type="text" placeholder="Full Name">
  <input type="text" placeholder="Address">
  <input type="text" placeholder="City">
  <input type="text" placeholder="Postcode">

  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
function buy(product) {
  document.getElementById("checkout").style.display = "block";
  document.getElementById("productName").innerText = "Buying: " + product;
}

function placeOrder() {
  alert("✅ Order placed! We will contact you soon.");
}
</script>

</body>
</html>
